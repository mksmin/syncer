name: Release

on:
  push:
    tags: ["[0-9]*.[0-9]*.[0-9]*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run validate:release -- --tag "${GITHUB_REF_NAME}"
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm test
      - run: pnpm run build
      - run: pnpm run validate:release -- --tag "${GITHUB_REF_NAME}" --assets
      - run: zip -j "syncer-${GITHUB_REF_NAME}.zip" main.js manifest.json styles.css
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --draft --generate-notes --verify-tag \
            --title "Syncer ${GITHUB_REF_NAME}" \
            main.js manifest.json styles.css "syncer-${GITHUB_REF_NAME}.zip"
